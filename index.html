<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KirjaEasy — Bookkeeping in your language</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css">
<style>
  :root{--side:#04342C;--sideBrand:#E1F5EE;--sideM:#8FCBB4;--sideA:rgba(255,255,255,.13);--sideAT:#ffffff;--navy:#04342C;--navy2:#0F6E56;--pri:#1D9E75;--priD:#0F6E56;--accent:#1D9E75;--acc:#7F77DD;--bg:#EFF4F2;--card:#fff;--line:#e6ece9;--text:#182420;--muted:#6a7a74;--green:#0F6E56;--red:#C4451F;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,"Noto Sans",Arial,sans-serif;background:var(--bg);color:var(--text)}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:214px;flex:none;background:var(--side);color:var(--sideBrand);display:flex;flex-direction:column;padding:16px 12px;position:sticky;top:0;height:100vh;z-index:40}
  .brand{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700;padding:2px 6px 18px;color:var(--sideBrand)}
  .brand .ic{width:30px;height:30px;border-radius:8px;background:var(--pri);color:#03251d;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
  #nav{display:flex;flex-direction:column;gap:2px}
  #nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:start;background:none;border:none;color:var(--sideM);padding:10px 12px;border-radius:9px;font-size:13.5px;cursor:pointer;font-family:inherit}
  #nav button i{font-size:19px;width:20px;text-align:center;flex:none}
  #nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  #nav button.active{background:var(--sideA);color:var(--sideAT);font-weight:600}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:9px 22px;min-height:56px}
  .burger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:2px 4px;align-items:center}
  .langs{display:flex;gap:2px;background:#eaf1ee;border-radius:14px;padding:3px}
  .langs button{background:none;border:none;color:var(--muted);padding:5px 11px;border-radius:12px;cursor:pointer;font-size:12px}
  .langs button.active{background:var(--pri);color:#fff;font-weight:600}
  #clientbar{min-width:0}
  .topbar .langs{margin-inline-start:auto}
  .page{padding:24px 26px;max-width:1120px;width:100%;margin:0 auto}
  .navscrim{display:none}
  @media(max-width:860px){
    .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .2s ease}
    .shell.navopen .sidebar{transform:translateX(0);box-shadow:0 0 50px rgba(0,0,0,.4)}
    .shell.navopen .navscrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:35}
    .burger{display:inline-flex}
    .page{padding:16px}
  }
  h2{margin:4px 0 2px;font-size:22px}
  .sub{color:var(--muted);margin:0 0 18px;font-size:14px}
  .bigbtn{width:100%;background:var(--pri);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
  .bigbtn:hover{background:var(--priD)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:500}
  input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:15px;background:#fff;color:var(--text)}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .typebtns{display:flex;gap:10px;margin-top:6px}
  .typebtns button{flex:1;padding:14px;border:2px solid var(--line);background:#fff;border-radius:11px;font-size:15px;cursor:pointer;font-weight:600;color:var(--muted)}
  .typebtns button.sel{border-color:var(--accent);color:var(--accent);background:#E1F5EE}
  .toggle{display:flex;gap:8px;margin-top:6px}
  .toggle button{flex:1;padding:10px;border:2px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-weight:600;color:var(--muted);font-size:14px}
  .toggle button.sel{border-color:var(--accent);color:var(--accent);background:#E1F5EE}
  .lineitem{border:1px solid var(--line);border-radius:11px;padding:12px;margin-top:10px;background:#fbfcfe}
  .lineitem .lhead{display:flex;justify-content:space-between;align-items:center}
  .lineitem .lhead span{font-size:12px;color:var(--muted);font-weight:600}
  .rmline{background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:2px 4px;width:auto}
  .linecalc{font-size:12px;color:var(--muted);margin-top:8px}
  .addline{width:100%;margin-top:10px;background:#E1F5EE;color:var(--accent);border:1px dashed var(--accent);border-radius:10px;padding:11px;cursor:pointer;font-weight:600;font-size:14px}
  .totbox{margin-top:14px;border-top:1px solid var(--line);padding-top:10px}
  .calc{display:flex;justify-content:space-between;font-size:14px;padding:5px 0;color:var(--muted)}
  .calc b{color:var(--text)}
  .calc.grand{font-size:16px;border-top:1px solid var(--line);margin-top:4px;padding-top:8px}
  .calc.grand b{color:var(--navy)}
  .actions{display:flex;gap:10px;margin-top:16px}
  .btn{flex:1;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
  .btn.save{background:var(--accent);color:#fff}.btn.cancel{background:#eef0f5;color:var(--text)}.btn.ghost{background:#eef0f5;color:var(--text)}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:none}
  .item .v{font-weight:600}.item .m{font-size:12px;color:var(--muted)}
  .amt.exp{color:var(--red)}.amt.inc{color:var(--green)}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:start;padding:8px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  td.num,th.num{text-align:end;font-variant-numeric:tabular-nums}
  .jgroup{font-weight:600;background:#f7f9fc}
  .totrow td{font-weight:700;border-top:2px solid var(--line)}
  .rtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .rtabs button{padding:8px 12px;border:1px solid var(--line);background:#fff;border-radius:20px;font-size:13px;cursor:pointer;color:var(--muted)}
  .rtabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .pl-line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .pl-total{display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:16px;border-top:2px solid var(--line);margin-top:4px}
  .pos{color:var(--green)}.neg{color:var(--red)}
  .thumb{max-width:100%;border-radius:9px;margin-top:8px;border:1px solid var(--line)}
  .note{font-size:12px;color:var(--muted);text-align:center;padding:16px;line-height:1.5}
  .plstmt .plrow{display:flex;justify-content:space-between;gap:16px;padding:2px 0;font-size:13px}
  .plstmt .plrow.b{font-weight:700;border-top:1px solid var(--line);margin-top:2px}
  .plstmt .pn{font-variant-numeric:tabular-nums;white-space:nowrap;text-align:end}
  .plstmt .plrow.drill{cursor:pointer;border-radius:6px;transition:background .1s}
  .plstmt .plrow.drill:hover{background:#E1F5EE}
  .plstmt .plrow.drill>.pn{color:var(--priD);text-decoration:underline}
  .monthhd{display:flex;justify-content:space-between;align-items:center;background:#eef2f8;border-radius:8px;padding:7px 12px;margin:14px 0 6px;font-weight:700;font-size:12.5px;color:#334155}
  .rephd{font-size:13px;margin-bottom:10px}
  .rephd .rhtitle{font-size:17px;font-weight:700;margin-bottom:10px}
  .rephd .rhsc{font-weight:700}
  .rephd .rhline{display:flex;justify-content:space-between;max-width:320px}
  .rephd .rhcol{display:flex;justify-content:space-between;border-bottom:1px solid var(--text);margin-top:10px;padding-bottom:3px;font-weight:700}
  .rephd .rhnorm{font-weight:400}
  .rephd .rhsub{font-weight:700;margin-top:3px}
  .mtbl{font-size:11px}.mtbl td.num,.mtbl th.num{white-space:nowrap;text-align:end}
  .mtbl tr.plbold td{font-weight:700}
  .jtbl{width:100%;border-collapse:collapse;font-size:12px}
  .jtbl th,.jtbl td{padding:3px 6px;border-bottom:1px solid var(--line)}
  .jtbl th{color:var(--muted);font-weight:600;text-align:start}
  .jtbl td.num,.jtbl th.num{text-align:end;font-variant-numeric:tabular-nums;white-space:nowrap}
  .jtbl .jvouch td{font-weight:600;background:#f7f9fc}
  .jtbl .jtot td{font-weight:600}
  .jtbl .jgrand td{font-weight:700;border-top:2px solid var(--navy)}
  .jtbl .lop td{color:var(--muted)}
  .vtbl{width:100%;border-collapse:collapse;font-size:12px}
  .vtbl td{padding:2px 6px}
  .vtbl td.num{text-align:end;font-variant-numeric:tabular-nums;white-space:nowrap}
  .vtbl .vsec td{font-weight:700;padding-top:12px;border-bottom:1px solid var(--line)}
  .vtbl .vsub td{font-weight:600;padding-top:6px}
  .vtbl .vhdr td{color:var(--muted);font-size:11px}
  .vtbl .vrate td{font-weight:600}
  .vtbl .vtot td{border-top:1px solid var(--line)}
  .vtbl .vgtot td{font-weight:700;border-top:2px solid var(--navy);padding-top:4px}
  #printarea{display:none}
  @media print{
    .shell{display:none!important}
    #printarea{display:block}
    .pdoc{font-size:12px;color:#000}
    .pdoc .phead{display:flex;justify-content:space-between;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:16px;font-size:12px}
    .pdoc .ptitle{font-size:18px;letter-spacing:1px;margin:0 0 14px;font-weight:700}
    .pdoc .pl-line,.pdoc .pl-total{border-color:#bbb}
    .pdoc table{font-size:11px}
    .pdoc th,.pdoc td{border-color:#ccc}
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="ic">€</span><span>KirjaEasy</span></div>
    <nav id="nav">
      <button data-p="home" class="active" data-k="nav_home"><i class="ti ti-layout-dashboard" aria-hidden="true"></i><span class="lbl">Home</span></button>
      <button data-p="entries" data-k="nav_entries"><i class="ti ti-list-details" aria-hidden="true"></i><span class="lbl">Entries</span></button>
      <button data-p="add" data-k="nav_add"><i class="ti ti-receipt" aria-hidden="true"></i><span class="lbl">Add</span></button>
      <button data-p="bulk" data-k="nav_bulk"><i class="ti ti-files" aria-hidden="true"></i><span class="lbl">Bulk</span></button>
      <button data-p="assets" data-k="nav_assets"><i class="ti ti-car" aria-hidden="true"></i><span class="lbl">Assets</span></button>
      <button data-p="loans" data-k="nav_loans"><i class="ti ti-building-bank" aria-hidden="true"></i><span class="lbl">Loans</span></button>
      <button data-p="reports" data-k="nav_reports"><i class="ti ti-chart-pie" aria-hidden="true"></i><span class="lbl">Reports</span></button>
    </nav>
  </aside>
  <div class="navscrim" onclick="toggleSidebar()"></div>
  <div class="main">
    <header class="topbar">
      <button class="burger" onclick="toggleSidebar()" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
      <div id="clientbar"></div>
      <div class="langs" id="langs">
        <button data-l="en" class="active">English</button>
        <button data-l="fi">Suomi</button>
        <button data-l="sv">Svenska</button>
      </div>
    </header>
    <div id="content" class="page"></div>
    <div class="note" id="footnote"></div>
  </div>
</div>
<div id="printarea"></div>

function lineCalc(amount,rate,vatIncluded){const a=parseFloat(amount)||0;if(vatIncluded){const net=round2(a/(1+rate/100));return{net,vat:round2(a-net),gross:round2(a)};}const net=round2(a);const vat=round2(a*rate/100);return{net,vat,gross:round2(net+vat)};}
function computeLine(line,type,vatIncluded){
  if(line.rate==="rc"){const net=round2(parseFloat(line.amount)||0);if(type==="expense")return{net,vat:0,gross:net,rcVat:round2(net*RC_RATE/100),euSale:false,rc:true};return{net,vat:0,gross:net,rcVat:0,euSale:true,rc:true};}
  const cv=lineCalc(line.amount,line.rate,vatIncluded);return{net:cv.net,vat:cv.vat,gross:cv.gross,rcVat:0,euSale:false,rc:false};
}
function lineCalcText(cv){if(cv.rc)return cv.euSale?`${t("lineNet")}: ${eur(cv.net)} · ${t("rcNote")}`:`${t("lineNet")}: ${eur(cv.net)} · ${t("lineVat")} (RC): ${eur(cv.rcVat)}`;return `${t("lineNet")}: ${eur(cv.net)} · ${t("lineVat")}: ${eur(cv.vat)}`;}
function totals(r){if(r.type==="journal"){let g=0;(r.lines||[]).forEach(l=>g+=(l.debit||0));return{net:round2(g),vat:0,gross:round2(g),rcVat:0,euSale:0};}let net=0,vat=0,gross=0,rcVat=0,euSale=0;r.lines.forEach(l=>{net+=l.net;vat+=l.vat;gross+=l.gross;rcVat+=(l.rcVat||0);euSale+=(l.euSale?l.net:0);});return{net:round2(net),vat:round2(vat),gross:round2(gross),rcVat:round2(rcVat),euSale:round2(euSale)};}

const BS_ACCT={carAsset:"fixedAssets",loanRepayment:"loan"};
function acctOf(cat){return BS_ACCT[cat]||cat;}
function linesFor(r){
  if(r.type==="journal")return (r.lines||[]).map(l=>({acc:l.acc,debit:round2(l.debit||0),credit:round2(l.credit||0),rate:l.rate}));
  const L=[];let cash=0,inVat=0,outVat=0;const contra={bank:"bank",private:"private",loan:"loan",asset:"fixedAssets"}[r.paidVia]||"bank";
  if(r.type==="expense"){
    r.lines.forEach(l=>{L.push({acc:acctOf(l.cat),debit:l.net,credit:0,rate:l.rate});cash+=l.gross;if(l.vat>0)inVat+=l.vat;if(l.rc){inVat+=(l.rcVat||0);outVat+=(l.rcVat||0);}});
    inVat=round2(inVat);outVat=round2(outVat);cash=round2(cash);
    if(inVat>0)L.push({acc:"inputVat",debit:inVat,credit:0});
    if(outVat>0)L.push({acc:"outputVat",debit:0,credit:outVat});
    L.push({acc:contra,debit:0,credit:cash});
  }else{
    r.lines.forEach(l=>cash+=l.gross);cash=round2(cash);
    L.push({acc:contra,debit:cash,credit:0});
    r.lines.forEach(l=>{L.push({acc:acctOf(l.cat),debit:0,credit:l.net,rate:l.rate});if(l.vat>0)outVat+=l.vat;});
    outVat=round2(outVat);
    if(outVat>0)L.push({acc:"outputVat",debit:0,credit:outVat});
  }
  return L;
}

async function fetchYtj(isCompany){
  const o=isCompany?company:cf;const bid=(o.bid||"").trim();
  if(!/^\d{6,7}-\d$/.test(bid)){toast(t("ytjBadId"));return;}
  toast(t("ytjFetching"));
  let co=null;try{const r=await fetch("https://avoindata.prh.fi/opendata-ytj-api/v3/companies?businessId="+encodeURIComponent(bid));const j=await r.json();co=j.companies&&j.companies[0];}catch(e){}
  try{
    if(!co){toast(t("ytjOpenPage"));window.open("https://tietopalvelu.ytj.fi/yritys/"+encodeURIComponent(bid),"_blank");return;}
    const nm=(co.names&&(co.names.find(n=>n.type==="1")||co.names[0])||{}).name||"";
    const addr=co.addresses&&(co.addresses.find(a=>a.type===1)||co.addresses[0]);
    if(addr){o.address=((addr.street||"")+(addr.buildingNumber?" "+addr.buildingNumber:"")).trim();const po=addr.postOffices&&(addr.postOffices.find(p=>p.languageCode==="1")||addr.postOffices[0]);o.postal=((addr.postCode||"")+(po?" "+po.city:"")).trim();}
    const form=co.companyForms&&co.companyForms[0];if(form&&form.descriptions)o.type=form.descriptions.some(d=>/osakeyhti|limited|aktiebolag/i.test(d.description||""))?"oy":"tmi";
    if(co.website&&co.website.url)o.website=co.website.url;
    if(co.businessId&&co.businessId.registrationDate)o.startDate=co.businessId.registrationDate;
    if(nm)o.name=nm;
    toast(t("ytjOk"));if(isCompany){saveCompany();renderClientBar();}render();
  }catch(e){toast(t("ytjErr"));}
}

function recalc(){

  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=eur(v);};
  set("tt_net",round2(net));set("tt_vat",round2(vat));set("tt_gross",round2(gross));
}

function compressImg(src,maxDim,quality){return new Promise(res=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);try{res(c.toDataURL("image/jpeg",quality));}catch(e){res(src);}};img.onerror=()=>res(src);img.src=src;});}

const _recCache={};
async function putReceipt(b64){
  if(!b64)return undefined;
  if(typeof b64==="string"&&!b64.startsWith("data:"))return b64; /* already a stored ref/id */
  if(!(sb&&session))return b64; /* offline fallback: keep inline */
  try{const id="r_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
    const{error}=await sb.from("kirjaeasy_receipts").insert({id,user_id:session.user.id,data:b64});
    if(error)throw error;_recCache[id]=b64;return id;
  }catch(e){console.warn("receipt upload failed",e&&e.message);return b64;}
}
async function getReceipt(ref){
  if(!ref)return null;
  if(typeof ref==="string"&&ref.startsWith("data:"))return ref; /* legacy inline image */
  if(_recCache[ref])return _recCache[ref];
  if(!(sb&&session))return null;
  try{const{data,error}=await sb.from("kirjaeasy_receipts").select("data").eq("id",ref).maybeSingle();if(error)throw error;const d=data&&data.data;if(d)_recCache[ref]=d;return d||null;}catch(e){console.warn("receipt fetch failed",e&&e.message);return null;}
}

function buildPrompt(knownType){
  const typeLine=knownType?`The user is filing this as an ${knownType.toUpperCase()}. Extract ONLY the ${knownType} lines and set "type" to "${knownType}".`:`Decide if it is primarily INCOME (money received/sales) or EXPENSE (a cost/purchase) and set "type".`;
  return `You are reading Finnish receipts/invoices. The file may contain SEVERAL separate receipts — one per page, or multiple receipts arranged within a SINGLE page/image. Return ONE object per separate receipt — be EXHAUSTIVE: list EVERY receipt you can see and never skip or merge different receipts. ${typeLine} Reply with ONLY valid JSON, no markdown: {"receipts":[{"type":"income or expense","vendor":"name","date":"YYYY-MM-DD","page":1,"vatIncluded":true or false,"lines":[{"desc":"text","cat":"category key","amount":number,"rate":25.5}]}]}. "page" = the 1-based page number where the receipt appears (use 1 for a single image); if one receipt spans several pages, return it once with all its lines.
INCOME cat: "sales" for earnings/fares/trip revenue, "otherIncome" for tips, bonuses, compensations and other-service revenue.
EXPENSE cat keys: purchases, extServices, salaries, yel, pensionTyel, empPensionTyel, workClothes, fuel, vehicleService, vehiclePublic, vehicleInsurance, vehicleOther, machineryRent, machineryOther, hotel, travelMeals, travelInsurance, parking, mealComp, accounting, legal, adminServices, mobile, adminOther, office, software, meals, travel, otherDeductible, penalInterestTax, interestOther, advanceTax, loanRepayment, other.
Rate must be 25.5, 24, 14, 13.5 or 0; OR "rc" for an EU reverse-charge PURCHASED service (supplier in another EU country, no Finnish VAT). Use rate 0 (exempt) for insurance, pension (YEL/TyEL/eläke), vehicle & public taxes, loan interest (korko), account/finance fees (tilinhoitomaksu), penalty interest (viivästyskorko). A loan PRINCIPAL repayment (Lyhennys) is NOT an expense — cat "loanRepayment" rate 0. Loan interest (Korko) → "interestOther" rate 0.
UBER / BOLT MONTHLY SUMMARY (mixed document): IGNORE the single-type instruction above — for this file ALWAYS return TWO separate receipts:
 (1) an INCOME receipt, type "income": trip/ride FARE revenue (Uber "Trip revenue"; Bolt "Fare breakdown" TOTAL incl. cancellation fee) → cat "sales", rate 14% if the period year is 2025 or earlier else 13.5%; bonuses, "other compensations", tips, "revenue from other services" → cat "otherIncome", rate 0. If amounts are shown "excl. VAT" (net) set vatIncluded=false, if gross/total set vatIncluded=true. Never mark income as reverse charge.
 (2) an EXPENSE receipt, type "expense": ONLY the platform service fee (Uber "Uber Service Fee"; Bolt "Bolt Fee") → cat "extServices", rate "rc" (EU reverse charge). Ignore mileage/km.
TELECOM / MOBILE invoice (e.g. DNA): ignore the individual monthly/usage/discount sub-lines. Use the invoice's VAT breakdown ("Verokantaerittely") / the final "Maksettava yhteensä" total: one line per VAT rate, cat "mobile", vatIncluded=true, amount = the final total incl. VAT (DNA standard rate 25.5%).
GENERAL: "vatIncluded" true only if amounts already include VAT. Prefer the invoice's FINAL total payable and VAT summary; account for discounts so lines reconcile to the final total. Passenger transport / ride fares use 14% (period ≤2025) or 13.5% (≥2026).`;
}
async function callAI(images,knownType,customPrompt){
  const key=getKey(),prov=getProvider(),prompt=customPrompt||buildPrompt(knownType);
  for(let attempt=0;;attempt++){
    try{return await _aiOnce(key,prov,prompt,images);}
    catch(e){const m=(e&&e.message)||"";if(attempt<4&&/(429|503|529|RESOURCE_EXHAUSTED|overloaded|quota)/i.test(m)){await new Promise(r=>setTimeout(r,9000*(attempt+1)));continue;}throw e;}
  }
}
async function _aiOnce(key,prov,prompt,images){
  let text;
  if(prov==="anthropic"){
    const content=images.map(img=>{const m=img.match(/^data:(.*?);base64,(.*)$/);return {type:"image",source:{type:"base64",media_type:m[1],data:m[2]}};});
    content.push({type:"text",text:prompt});
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:4000,messages:[{role:"user",content}]})});
    if(!res.ok)throw new Error("HTTP "+res.status+" "+(await res.text()).slice(0,150));
    const j=await res.json();text=j.content[0].text;
  }else{
    const content=[{type:"text",text:prompt}];images.forEach(img=>content.push({type:"image_url",image_url:{url:img}}));
    const res=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"content-type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"gpt-4o",max_tokens:4000,messages:[{role:"user",content}]})});
    if(!res.ok)throw new Error("HTTP "+res.status+" "+(await res.text()).slice(0,150));
    const j=await res.json();text=j.choices[0].message.content;
  }
  return parseAIJson(text);
}
function parseAIJson(text){
  let s=String(text||"").replace(/```json|```/g,"").trim();
  try{return JSON.parse(s);}catch(e){}
  const a=s.indexOf("{"),b=s.lastIndexOf("}");
  if(a>=0&&b>a){try{return JSON.parse(s.slice(a,b+1));}catch(e){}}
  throw new Error("Couldn't read this receipt (blurry or too complex). Try re-scanning, or add it manually.");
}
let _heicTo=null;
async function ensureHeic(){
  if(_heicTo)return _heicTo;
  const mod=await import("https://esm.sh/heic-to@1.1.14");
  _heicTo=mod.heicTo||mod.default;
  if(typeof _heicTo!=="function")throw new Error("Could not load the HEIC converter (check your connection).");
  return _heicTo;
}
async function fileToImages(file){
  const nm=(file.name||"").toLowerCase();
  if(/image\/hei[cf]/.test(file.type||"")||/\.hei[cf]$/.test(nm)){
    const heicTo=await ensureHeic();
    const b=await heicTo({blob:file,type:"image/jpeg",quality:0.9});
    const raw=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(b);});
    return [await compressImg(raw,1600,0.9)];
  }
  if(file.type==="application/pdf"||/\.pdf$/.test(nm)){
    const buf=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    const n=Math.min(pdf.numPages,30);const out=[];
    for(let p=1;p<=n;p++){const page=await pdf.getPage(p);const viewport=page.getViewport({scale:1.8});
      const canvas=document.createElement("canvas");canvas.width=viewport.width;canvas.height=viewport.height;
      await page.render({canvasContext:canvas.getContext("2d"),viewport}).promise;out.push(canvas.toDataURL("image/jpeg",0.8));}
    return out;
  }
  const raw=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
  return [await compressImg(raw,1600,0.9)];
}

async function driveListFolder(folderId){

async function driveDownload(f,folderName){
  const mt=f.mimeType||"",nm=f.name||"file";
  if(mt.indexOf("application/vnd.google-apps")===0)return null;
  const ok=mt.startsWith("image/")||mt==="application/pdf"||/\.(jpe?g|png|gif|webp|bmp|heic|heif|pdf)$/i.test(nm);
  if(!ok)return null;
  const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media&supportsAllDrives=true",{headers:{Authorization:"Bearer "+_gToken}});
  if(!r.ok)throw new Error("download "+r.status);
  const blob=await r.blob();
  const file=new File([blob],nm,{type:mt||blob.type||""});
  try{file._relpath=(folderName?folderName+"/":"")+nm;}catch(e){}
  return file;
}

function mapLine(l,type){
  const raw=l.rate;let rate=(raw==="rc"||raw==="RC")?"rc":(VALID_RATES.includes(Number(raw))?Number(raw):25.5);
  const valid=type==="expense"?EXP_CATS:INC_CATS;
  let cat=l.cat;if(!valid.includes(cat))cat=type==="expense"?"purchases":(/tip|gratu|juomaraha|bonus|compensation/i.test(l.desc||"")?"otherIncome":"sales");
  return{desc:l.desc||"",cat,amount:String(l.amount==null?"":l.amount),rate};
}
function applyExtract(d){
  if(d.vendor)draft.vendor=d.vendor;
  if(d.date&&/^\d{4}-\d{2}-\d{2}$/.test(d.date))draft.date=d.date;
  if(typeof d.vatIncluded==="boolean")draft.vatIncluded=d.vatIncluded;
  const mapped=(d.lines||[]).map(l=>mapLine(l,draft.type));
  draft.lines=mapped.length?mapped:[newLine(draft.type)];
  renderAdd();
  if(mapped.length===0)showDiag(t("aiNoLines"),false);else showDiag(t("aiSaved"),true);
}

function monthList(fromIso,toKey){const out=[];let a=String(fromIso).slice(0,7).split("-").map(Number),y=a[0],m=a[1];const b=toKey.split("-").map(Number),ty=b[0],tm=b[1];let g=0;while((y<ty||(y===ty&&m<=tm))&&g<600){out.push(y+"-"+String(m).padStart(2,"0"));m++;if(m>12){m=1;y++;}g++;}return out;}
function postDeprecMonth(a,mk){if(a.disposed)return false;if(assetDepMonths(a.id).has(mk))return false;const bv=assetBookValue(a);if(bv<=0.01)return false;let amt=round2(bv*anum(a.rate)/100/12);if(amt>bv)amt=bv;if(amt<=0.005)return false;const dateIso=mk+"-"+lastDayOfMonth(mk);tx.push({id:Date.now()+Math.floor(Math.random()*100000),type:"expense",vendor:(a.name||t("assetDeprec"))+" — "+t("assetDeprec"),date:dateIso,od:dateIso,vatIncluded:false,paidVia:"asset",lines:[{desc:t("assetDeprec"),cat:"depreciation",rate:0,net:amt,vat:0,gross:amt,rc:false}],assetRef:a.id,asset:{kind:"deprec",depMonth:mk}});return true;}
function postDeprecDue(id){const a=assets.find(x=>x.id===id);if(!a)return;const posted=assetDepMonths(id);monthList(a.date,curMonthKey()).forEach(mk=>{if(!posted.has(mk))postDeprecMonth(a,mk);});save();renderAssets();}
function postDeprecAll(){let n=0;assets.forEach(a=>{if(a.disposed)return;const posted=assetDepMonths(a.id);monthList(a.date,curMonthKey()).forEach(mk=>{if(!posted.has(mk)&&postDeprecMonth(a,mk))n++;});});save();toast(n+" "+t("depPosted"));renderAssets();}
function unpostLastDep(id){const deps=assetDeps(id).slice().sort((x,y)=>(x.asset.depMonth<y.asset.depMonth?-1:1));if(!deps.length)return;const last=deps[deps.length-1];tx=tx.filter(r=>r.id!==last.id);save();renderAssets();}
function anum(v){return round2(parseFloat(String(v==null?"":v).replace(",","."))||0);}
function buyCalc(){const gross=anum(af.cost),rate=anum(af.rate)||25.5;const vat=af.vatDed?round2(gross-gross/(1+rate/100)):0;const net=round2(gross-vat);const down=Math.min(anum(af.down),gross);const loan=round2(gross-down);return{gross,rate,vat,net,down,loan};}

function setAfDownSrc(v){af.downSrc=v;renderAssets();}

function removeAssetGroup(id){tx=tx.filter(x=>x.id!==id&&x.linkedTo!==id);}
function editAsset(id){let r=tx.find(x=>x.id===id);if(!r)return;if(!r.asset&&r.linkedTo)r=tx.find(x=>x.id===r.linkedTo);if(!r||!r.asset)return;

  if(c.loan>0.005&&af.mkLoan&&anum(af.finTerm)>=1&&!loans.some(l=>l.assetRef===aid))loans.push({id:aid+2,name:af.desc||t("loan"),principal:String(c.loan),term:af.finTerm,rate:af.finRate,totalInterest:af.finTotalInterest,payment:af.finPayment,balloon:af.finBalloon,fee:af.finFee,openFee:af.finOpenFee,start:af.date,assetRef:aid});

function assetDisposeReg(){const a=assets.find(x=>String(x.id)===String(af.dispId));if(!a){toast(t("disposePick"));return;}

const CAR_PROMPT=`You are reading a Finnish CAR purchase invoice or hire-purchase/instalment (osamaksusopimus) contract. Extract BOTH the vehicle acquisition AND any financing terms in one JSON object. Reply ONLY with JSON, no markdown: {"description":"make model and registration plate","date":"YYYY-MM-DD purchase/contract date","price":<number: total CASH price of the car incl. VAT, incl. delivery (toimituskulu) and registration (rekisteröinti); for an osamaksu contract use 'Ajoneuvon käteishinta'/'Kulkuneuvon käteishinta'>,"vatDeductible":true or false,"vatRate":25.5,"downPayment":<number: cash paid now from own funds — 'käteisosuus'/'maksu toimitettaessa'/'etumaksu'/'Tilisiirto Heti'; 0 if fully financed>,"financed":<number: financed amount 'Rahoitettava osa'/'Rahoitettava osuus'; 0 if none>,"term":<integer number of monthly instalments 'KK-erien lkm'/'Sopimusaika kk'; 0 if none>,"totalInterest":<number total interest 'Korko'/'Korko sopimusajalta'; 0 if none>,"monthlyPayment":<number 'Maksuerä €/kk'; 0 if none>,"interestRate":<number annual interest % 'Korko %'/'todellinen vuosikorko'; 0 if none; NEVER the 18% viivästyskorko>,"finalInstalment":<number the last/balloon instalment 'Viimeinen erä' ONLY if larger than the monthly; 0 if equal>,"feePerInstalment":<number 'Käsittelymaksu €/erä'; 0 if none>,"handlingFeesTotal":<number 'Käsittelymaksu yhteensä'/'Käsittelymaksut yhteensä'; 0 if none>,"openingFee":<number 'Avausmaksu'/'Tilinavausmaksu'/'perustamiskustannukset'; 0 if none>}. Set vatDeductible=true ONLY if the car is fully VAT-liable / VAT itemised as deductible ('Arvonlisäverollinen osuus 100%' or a commercial vehicle); most private passenger cars: false. Use a dot for decimals; plain numbers only.`;
async function aiReadCar(images){return await callAI(images,null,CAR_PROMPT);}
async function aiReadCarFile(e){const f=e.target.files[0];if(!f)return;if(!getKey()){toast(t("aiNeedKeyAssets"));return;}
  toast(t("readingDoc"));
  try{const imgs=await fileToImages(f);const d=await aiReadCar(imgs);
    if(d.description)af.desc=d.description;if(d.date)af.date=d.date;
    if(d.price!=null)af.cost=String(d.price);if(typeof d.vatDeductible==="boolean")af.vatDed=d.vatDeductible;
    if(d.vatRate)af.rate=String(d.vatRate);if(d.downPayment!=null)af.down=String(d.downPayment);
    // financing → set up the loan schedule from the same document
    if(Number(d.term)>0){af.mkLoan=true;af.finTerm=String(d.term);
      if(Number(d.totalInterest)>0)af.finTotalInterest=String(d.totalInterest);
      if(Number(d.monthlyPayment)>0)af.finPayment=String(d.monthlyPayment);
      if(Number(d.interestRate)>0)af.finRate=String(d.interestRate);
      if(Number(d.finalInstalment)>0&&Math.abs(Number(d.finalInstalment)-(Number(d.monthlyPayment)||0))>0.5)af.finBalloon=String(d.finalInstalment);
      let fee=Number(d.feePerInstalment)||0;if(!fee&&Number(d.handlingFeesTotal)>0&&Number(d.term)>0)fee=round2(Number(d.handlingFeesTotal)/Number(d.term));if(fee>0)af.finFee=String(fee);
      if(Number(d.openingFee)>0)af.finOpenFee=String(d.openingFee);}
    assetMode="buy";toast(t("docReadCar"));renderAssets();
  }catch(err){toast((err&&err.message)?err.message:String(err));}}

/* ---------- loans (financing + amortization schedule) ---------- */
function addMonths(iso,m){const p=String(iso).split("-").map(Number);const d=new Date(p[0],(p[1]-1)+m,p[2]||1);const z=x=>String(x).padStart(2,"0");return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());}
function annuityFactor(r,m){return r>1e-9?(1-Math.pow(1+r,-m))/r:m;}
function pvGap(P,n,r,M,balloon){let pv=0;for(let k=1;k<=n;k++){const pay=(balloon>0&&k===n)?balloon:M;pv+=pay/Math.pow(1+r,k);}return pv-P;}
function solveRateGeneral(P,n,M,balloon){if(pvGap(P,n,0,M,balloon)<=0.005)return 0;let lo=0,hi=1;for(let i=0;i<200;i++){const mid=(lo+hi)/2;if(pvGap(P,n,mid,M,balloon)>0)lo=mid;else hi=mid;}return (lo+hi)/2;}
function loanTerms(loan){const P=anum(loan.principal),n=Math.max(1,Math.round(anum(loan.term))),balloon=anum(loan.balloon);let M,r,src;
  if(anum(loan.rate)>0){r=anum(loan.rate)/1200;M=round2((P-(balloon>0?balloon*Math.pow(1+r,-n):0))/annuityFactor(r,balloon>0?n-1:n));src="rate";}
  else if(anum(loan.payment)>0){M=anum(loan.payment);r=solveRateGeneral(P,n,M,balloon);src="payment";}
  else if(anum(loan.totalInterest)>0){const tot=P+anum(loan.totalInterest);M=round2(balloon>0?(tot-balloon)/Math.max(1,n-1):tot/n);r=solveRateGeneral(P,n,M,balloon);src="total";}
  else{r=0;M=round2(balloon>0?(P-balloon)/Math.max(1,n-1):P/n);src="none";}
  const totalPaid=balloon>0?round2(M*(n-1)+balloon):round2(M*n);
  return{P,n,M,r,balloon,src,annualRate:round2(r*12*100),totalInterest:round2(totalPaid-P)};}
function amortSchedule(loan){const T=loanTerms(loan),P=T.P,n=T.n,M=T.M,r=T.r,balloon=T.balloon,fee=anum(loan.fee),openFee=anum(loan.openFee);
  const rows=[];let bal=P;
  for(let k=1;k<=n;k++){let interest=round2(bal*r);let pay=(balloon>0&&k===n)?balloon:M;let principal=round2(pay-interest);if(k===n||principal>bal)principal=round2(bal);bal=round2(bal-principal);const rowFee=round2(fee+(k===1?openFee:0));rows.push({k,date:addMonths(loan.start,k-1),payment:round2(principal+interest),interest,principal,fee:rowFee,balance:bal});}
  return{pay:M,rows,annualRate:T.annualRate,totalInterest:T.totalInterest,src:T.src,balloon};}
function loanPosted(id){return tx.filter(r=>r.loanRef===id).map(r=>r.loanMonth);}
function loanBalance(loan){const sc=amortSchedule(loan),posted=new Set(loanPosted(loan.id));let paid=0;sc.rows.forEach(r=>{if(posted.has(r.k))paid=round2(paid+r.principal);});return round2(anum(loan.principal)-paid);}
function postLoanMonth(loan,row){if(tx.some(r=>r.loanRef===loan.id&&r.loanMonth===row.k))return;
  const lines=[{acc:"loan",debit:row.principal,credit:0}];
  if(row.interest>0.005)lines.push({acc:"interestOther",debit:row.interest,credit:0});
  if(row.fee>0.005)lines.push({acc:"financeFee",debit:row.fee,credit:0});
  lines.push({acc:"bank",debit:0,credit:round2(row.principal+row.interest+row.fee)});
  tx.push({id:Date.now()+row.k,type:"journal",vendor:(loan.name||t("loan"))+" — "+t("loanPayment")+" "+row.k+"/"+Math.max(1,Math.round(anum(loan.term))),date:row.date,od:row.date,lines,loanRef:loan.id,loanMonth:row.k,asset:{kind:"loanpay",loanId:loan.id,month:row.k}});}
function postLoanMonthById(id,k){const loan=loans.find(l=>l.id===id);if(!loan)return;const row=amortSchedule(loan).rows.find(r=>r.k===k);if(row)postLoanMonth(loan,row);save();renderLoans();}
function postDue(id){const loan=loans.find(l=>l.id===id);if(!loan)return;const sc=amortSchedule(loan),posted=new Set(loanPosted(id)),today=new Date().toISOString().slice(0,10);sc.rows.forEach(r=>{if(!posted.has(r.k)&&r.date<=today)postLoanMonth(loan,r);});save();renderLoans();}
function unpostLoanMonth(id,k){tx=tx.filter(r=>!(r.loanRef===id&&r.loanMonth===k));save();renderLoans();}

function renderLoanDetail(loan){
  const sc=amortSchedule(loan),posted=new Set(loanPosted(loan.id)),today=new Date().toISOString().slice(0,10);

  h+=`</tbody></table></div><p class="m" style="margin-top:8px">${t("loanScheduleNote")}</p>`;
  C.innerHTML=h;
}

function setBulkStatus(msg){const e=document.getElementById("bulk_status");if(e)e.textContent=msg;}
function fpKey(type,vendor,gross,od){return type+"|"+String(vendor||"").toLowerCase().trim()+"|"+round2(gross)+"|"+(od||"");}
function existingFps(){const s=new Set();tx.forEach(r=>s.add(fpKey(r.type,r.vendor,totals(r).gross,r.od||r.date)));return s;}
function folderPeriod(relPath){
  let rel=(relPath||"").toLowerCase();const slash=rel.lastIndexOf("/");if(slash<0)return null;rel=rel.slice(0,slash);
  const ym=rel.match(/20\d{2}/);if(!ym)return null;const year=+ym[0];
  const names=[["january","jan","tammikuu","januari"],["february","feb","helmikuu","februari"],["march","mar","maaliskuu","mars"],["april","apr","huhtikuu"],["may","toukokuu","maj"],["june","jun","kesäkuu","kesakuu","juni"],["july","jul","heinäkuu","heinakuu","juli"],["august","aug","elokuu","augusti"],["september","sep","syyskuu"],["october","oct","lokakuu","oktober"],["november","nov","marraskuu"],["december","dec","joulukuu"]];
  for(let m=0;m<12;m++)for(const nm of names[m])if(rel.includes(nm))return{year,month:m+1};
  let mm=rel.match(/20\d{2}[^0-9]?(0[1-9]|1[0-2])(?![0-9])/);if(mm)return{year,month:+mm[1]};
  mm=rel.match(/(0[1-9]|1[0-2])[^0-9]?20\d{2}/);if(mm)return{year,month:+mm[1]};
  return null;
}
async function runBulk(files){
  const list=[...files].filter(f=>{const ty=f.type||"",n=(f.name||"").toLowerCase();return ty.startsWith("image/")||ty==="application/pdf"||/\.(jpe?g|png|gif|webp|bmp|heic|heif|pdf)$/.test(n);});
  if(list.length===0){setBulkStatus(t("bulkNoFiles"));return;}
  if(!getKey()){setBulkStatus(t("aiNeedKey"));return;}
  bulkItems=[];bulkBusy=true;const seen=existingFps();
  for(let i=0;i<list.length;i++){
    const f=list[i];const rel=(f.webkitRelativePath||f._relpath||f.name||"").toLowerCase();
    const forced=bulkForce!=="auto"?bulkForce:(/(expense|expenses|meno|menot|kulu|kulut|utgift|osto|ostot|ostolasku|purchase|hankinta)/.test(rel)?"expense":(/(income|revenue|tulo|tulot|myynti|sales|inkomst|intäkt)/.test(rel)?"income":null));
    const period=folderPeriod(f.webkitRelativePath||f._relpath||"");
    setBulkStatus(t("bulkReading")+" "+(i+1)+" / "+list.length+" — "+f.name);
    try{
      const imgs=await fileToImages(f);
      const CHUNK=5;let recs=[];
      for(let pp=0;pp<imgs.length;pp+=CHUNK){
        setBulkStatus(t("bulkReading")+" "+(i+1)+" / "+list.length+" — "+f.name+" ("+Math.min(pp+CHUNK,imgs.length)+"/"+imgs.length+")");
        const dc=await callAI(imgs.slice(pp,pp+CHUNK),forced);
        const rs=(dc.receipts&&dc.receipts.length)?dc.receipts:[dc];
        rs.forEach(r=>{r.page=(Number(r.page)>=1?Number(r.page):1)+pp;});
        recs=recs.concat(rs);
      }
      const isPlatform=recs.some(r=>/uber|bolt/i.test(r.vendor||""));
      let any=false;
      for(const rec of recs){
        const type=isPlatform?(rec.type==="expense"?"expense":"income"):(forced||(rec.type==="expense"?"expense":"income"));
        const vi=typeof rec.vatIncluded==="boolean"?rec.vatIncluded:true;
        const computed=(rec.lines||[]).map(l=>{const ml=mapLine(l,type);const cv=computeLine(ml,type,vi);return{desc:ml.desc,cat:ml.cat,rate:ml.rate,net:cv.net,vat:cv.vat,gross:cv.gross,rcVat:cv.rcVat,euSale:cv.euSale,rc:cv.rc};}).filter(l=>l.gross>0);
        if(computed.length===0)continue;
        any=true;
        let date=(rec.date&&/^\d{4}-\d{2}-\d{2}$/.test(rec.date))?rec.date:new Date().toISOString().slice(0,10);
        if(period){const dp=date.split("-").map(Number);if(dp[0]!==period.year||dp[1]!==period.month){const last=new Date(period.year,period.month,0).getDate();date=`${period.year}-${String(period.month).padStart(2,"0")}-${String(last).padStart(2,"0")}`;}}
        const pg=(Number(rec.page)>=1&&Number(rec.page)<=imgs.length)?Number(rec.page)-1:0;
        const att=await compressImg(imgs[pg],1100,0.55);
        const gross=totals({lines:computed}).gross,fp=fpKey(type,rec.vendor,gross,rec.date),dup=seen.has(fp);if(!dup)seen.add(fp);
        bulkItems.push({file:f.name,keep:!dup,dup,type,vendor:rec.vendor||"",date,od:rec.date||date,vatIncluded:vi,lines:computed,att});
      }
      if(!any)bulkItems.push({file:f.name,keep:false,error:t("bulkNoData")});
    }catch(err){bulkItems.push({file:f.name,keep:false,error:(err&&err.message?err.message:String(err))});}
  }
  bulkBusy=false;renderBulk();
}
